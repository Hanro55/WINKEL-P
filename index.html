<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zweers Troue Gallery Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
/* --- Background & Body --- */
body::before{
    content:"";
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:url('Wedding.jpg') no-repeat center center;
    background-size:cover; opacity:0.3; z-index:-1;
}
body{margin:0; font-family:'Poppins', sans-serif; background:#000; color:#fff;}

/* --- Container & Typography --- */
.container{max-width:1000px;margin:0 auto;padding:20px;}
h1{text-align:center;font-size:32px;color:#fff;}
p{text-align:center;font-size:18px;color:#ccc;}

/* --- Buttons --- */
button{border:none;border-radius:30px;font-size:16px;cursor:pointer;margin:5px;transition:0.3s;}
.upload-btn{background:#ff4da6;color:white;padding:12px 25px;}
.upload-btn:hover{background:#e60084;}
.download-btn{background:#4da6ff;color:white;padding:12px 20px;}
.select-all-btn{background:#00ff99;color:black;padding:12px 20px;}
.select-all-btn:hover{background:#00cc7a;}
.deselect-all-btn{background:#ffcc00;color:black;padding:12px 20px;}
.deselect-all-btn:hover{background:#e6b800;}
.delete-btn{background:#ff3333;color:white;font-size:14px;padding:5px 10px; cursor:pointer;}
#searchBtn{background:#ff4da6;color:#fff; border-radius:15px; padding:8px 15px; cursor:pointer; transition:0.3s;}
#searchBtn:hover{background:#e60084;}

/* --- Drop area --- */
#drop-area{border:2px dashed #fff;padding:20px;border-radius:20px;margin:20px 0;text-align:center;transition:0.3s;}
#drop-area.hover{background:rgba(255,255,255,0.1);}
.controls{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:20px;}

/* --- Gallery --- */
.gallery{display:flex; flex-direction:column; gap:20px; margin-top:20px;}
.user-section{display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:10px;}
.gallery-item{position:relative; display:flex; flex-direction:column; align-items:center; transition:0.3s; background:rgba(255,255,255,0.05); border-radius:10px; overflow:hidden; padding:5px;}
.gallery-item img{width:100%; border-radius:10px; cursor:pointer; opacity:0; animation:fadeIn 0.5s forwards;}
@keyframes fadeIn{to{opacity:1;}}
.checkbox-container{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.5);padding:2px 6px;border-radius:5px;}
.gallery-info{font-size:12px;padding:5px;text-align:center;color:#fff; line-height:1.3;}
.gallery-info span.name{font-weight:600; display:block; margin-bottom:5px;}
.gallery-info span.message{font-style:italic; display:block;}

/* --- Carousel --- */
.carousel{position:relative;width:100%;max-height:300px;margin-bottom:20px;overflow:hidden;border-radius:10px;}
.carousel img{width:100%;height:300px;object-fit:cover;}
.carousel-caption{position:absolute;bottom:10px;left:10px;color:#fff;font-size:20px;background:rgba(0,0,0,0.5);padding:5px 10px;border-radius:5px;}
.carousel-btn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,0.5);color:white;border:none;font-size:24px;padding:10px;border-radius:50%;cursor:pointer;}
.carousel-btn.left{left:10px;} 
.carousel-btn.right{right:10px;}

/* --- Sidebar --- */
.sidebar{position:fixed;left:0;top:0;height:100%;width:220px;background:rgba(0,0,0,0.9);color:#fff;overflow-x:hidden;transition:width 0.3s;padding-top:60px;z-index:1000;}
.sidebar.collapsed{width:0;padding:0;}
.sidebar a{display:block;padding:10px 20px;text-decoration:none;color:white;}
.sidebar a:hover{background:#111;}
#sidebarToggle{position:fixed;left:10px;top:15px;background:#ff4da6;border-radius:50%;width:40px;height:40px;border:none;cursor:pointer;color:#fff;font-size:24px;z-index:1100;}
#sidebarToggle:hover{background:#e60084;}

/* --- Search bar --- */
.search-container{display:flex; justify-content:center; gap:5px; margin-bottom:15px;}
#searchBar{flex:1; max-width:300px; padding:8px 12px; border-radius:15px; border:none;}
#searchBar:focus{outline:none; box-shadow:0 0 5px #ff4da6;}

/* --- Stats --- */
.stats{display:flex;flex-wrap:wrap;justify-content:center;gap:15px;margin:15px auto;font-size:14px;color:#fff;}
.stat-card{background:rgba(255,255,255,0.1); padding:10px 15px; border-radius:12px; text-align:center; min-width:120px;}

/* --- Inputs --- */
#uploaderName,#categorySelect,#memoryMsg{background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.3); color:#fff; padding:8px 12px; border-radius:15px; font-size:16px; margin:5px; width:calc(100%-20px);}
#uploaderName::placeholder,#memoryMsg::placeholder{color:rgba(255,255,255,0.6);}

/* --- Lightbox --- */
#lightboxOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center;z-index:2000;}
#lightboxOverlay img{max-width:90%;max-height:90%;border-radius:10px;}
#lightboxOverlay span{position:absolute;top:20px;right:30px;font-size:30px;color:white;cursor:pointer;}

/* --- Messages Section --- */
.messages-container{display:flex; flex-direction:column; align-items:center;}
.message-box{background:rgba(255,255,255,0.1); padding:15px; border-radius:15px; width:100%; max-width:500px; margin-bottom:10px; position:relative;}
.message-box strong{display:block; margin-bottom:5px; color:#ff4da6;}
.message-box p{margin:0; color:#fff; font-size:14px;}
.message-box .msg-delete-btn{position:absolute; top:5px; right:5px; background:#ff3333; color:#fff; border:none; border-radius:50%; width:25px; height:25px; cursor:pointer;}
</style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar collapsed" id="sidebar">
    <a href="#" data-category="all">Alle Fotos</a>
    <a href="#" data-category="family">Familie</a>
    <a href="#" data-category="bride">Bride</a>
    <a href="#" data-category="groom">Groom</a>
    <a href="#" data-category="friends">Friends</a>
    <a href="#" data-category="other">Other</a>
    <a href="#" data-category="my">My Fotos</a>
    <a href="#" id="adminBtn">🔐 Admin</a>
</div>
<button id="sidebarToggle">☰</button>

<!-- Hero Carousel -->
<div class="carousel" id="heroCarousel">
    <div class="carousel-caption">Zweers Troue 2026 ❤️</div>
</div>

<div class="container">
    <h1>📸 Zweers Troue Gallery</h1>
    <p>Upload jou photos vanaf jou foon of rekenaar! ❤️</p>

    <!-- Search bar + button -->
    <div class="search-container">
        <input id="searchBar" placeholder="🔍 Soek naam...">
        <button id="searchBtn">Soek</button>
    </div>

    <!-- Drop area -->
    <div id="drop-area">
        <input type="file" id="fileInput" hidden>
        <input type="text" id="uploaderName" placeholder="Jou naam (Opsioneel)">
        <select id="categorySelect">
            <option value="family">Family</option>
            <option value="bride">Bride</option>
            <option value="groom">Groom</option>
            <option value="friends">Friends</option>
            <option value="other">Other</option>
        </select>
        <input type="text" id="memoryMsg" placeholder="Stuur ñ boodskap vir die bruidspaar saam jou foto's">
        <button class="upload-btn" onclick="document.getElementById('fileInput').click()">Upload Photo</button>
        <p>Of sleep jou foto hierheen</p>
    </div>

    <!-- Controls -->
    <div class="controls" id="adminControls" style="display:none;">
        <button class="select-all-btn" id="selectAllBtn">Select All</button>
        <button class="deselect-all-btn" id="deselectAllBtn">Deselect All</button>
        <button class="download-btn" id="downloadSelectedBtn">Download Selected</button>
    </div>

    <div class="confetti-message" id="confettiMessage"></div>
    <div class="stats" id="stats"></div>
    <div class="gallery" id="gallery"></div>
</div>

<!-- Messages Section -->
<section style="margin-top:50px;">
    <h2 style="text-align:center;color:#ff4da6;">💌 Los 'n boodskap vir die bruidspaar</h2>
    <div class="messages-container">
        <input type="text" id="msgName" placeholder="Jou Naam" style="padding:10px; border-radius:15px; width:100%; max-width:400px; margin-bottom:10px;">
        <textarea id="msgText" placeholder="Jou boodskap..." style="width:100%; max-width:400px; height:80px; border-radius:15px; padding:10px;"></textarea>
        <button class="upload-btn" id="sendMsgBtn">Stuur Boodskap</button>
    </div>
    <div id="messagesList" style="margin-top:30px;"></div>
</section>

<!-- Lightbox -->
<div id="lightboxOverlay">
    <span id="closeLightbox">&times;</span>
    <img id="lightboxImg">
</div>

<script type="module">
// Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, listAll, getDownloadURL, deleteObject, getMetadata, updateMetadata } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-storage.js";

const firebaseConfig = { /* jou config */ };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

// Admin
const adminPassword = "troueAdmin123";
let isAdmin=false;

// DOM
const input = document.getElementById("fileInput");
const dropArea = document.getElementById("drop-area");
const uploaderNameInput = document.getElementById("uploaderName");
const categorySelect = document.getElementById("categorySelect");
const memoryMsgInput = document.getElementById("memoryMsg");
const gallery = document.getElementById("gallery");
const heroCarousel = document.getElementById("heroCarousel");
const searchBar = document.getElementById("searchBar");
const statsDiv = document.getElementById("stats");
const sidebar = document.getElementById("sidebar");
const toggleBtn = document.getElementById("sidebarToggle");
toggleBtn.addEventListener("click", ()=> sidebar.classList.toggle("collapsed"));

// Admin login
document.getElementById("adminBtn").addEventListener("click", ()=>{
    if(isAdmin){ alert("Jy is reeds as Admin ingeteken."); return; }
    const pass = prompt("Voer admin password in:");
    if(pass===adminPassword){
        isAdmin=true;
        document.getElementById("adminControls").style.display="flex";
        alert("Admin toegang gegee! Delete knoppies is nou sigbaar.");
        loadImages(currentFilter, searchBar.value);
        loadMessages();
    } else alert("Verkeerde password!");
});

// Lightbox
const lightboxOverlay = document.getElementById("lightboxOverlay");
const lightboxImg = document.getElementById("lightboxImg");
document.getElementById("closeLightbox").addEventListener("click", ()=>lightboxOverlay.style.display="none");

// ... [die loadImages, upload, like, delete, select/deselect, carousel, messages logika] ...
// ========== Global Variables ==========
let currentFilter = "all";
let carouselIndex = 0;
let imagesData = []; // Stores images info for gallery and carousel

// ========== Upload & Gallery ==========
input.addEventListener("change", async (e)=>{
    const files = e.target.files;
    for(const file of files){
        const name = uploaderNameInput.value || "Anonymous";
        const category = categorySelect.value;
        const memoryMsg = memoryMsgInput.value || "";
        const storageRef = ref(storage, `photos/${file.name}`);
        await uploadBytes(storageRef, file);
        await addDoc(collection(db, "photos"), {
            fileName: file.name,
            uploader: name,
            category: category,
            message: memoryMsg,
            timestamp: Date.now()
        });
    }
    input.value="";
    memoryMsgInput.value="";
    uploaderNameInput.value="";
    loadImages(currentFilter, searchBar.value);
});

// Drag & Drop
dropArea.addEventListener("dragover", e=>{e.preventDefault(); dropArea.classList.add("hover");});
dropArea.addEventListener("dragleave", e=>{e.preventDefault(); dropArea.classList.remove("hover");});
dropArea.addEventListener("drop", e=>{
    e.preventDefault();
    dropArea.classList.remove("hover");
    input.files = e.dataTransfer.files;
    input.dispatchEvent(new Event("change"));
});

// ========== Load Images ==========
async function loadImages(filter="all", search=""){
    gallery.innerHTML="";
    imagesData=[];
    heroCarousel.innerHTML="";
    const querySnapshot = await getDocs(collection(db, "photos"));
    querySnapshot.forEach(docSnap=>{
        const data = docSnap.data();
        if((filter==="all"||data.category===filter) && data.uploader.toLowerCase().includes(search.toLowerCase())){
            imagesData.push({...data, id:docSnap.id});
        }
    });

    // Sort by timestamp descending
    imagesData.sort((a,b)=>b.timestamp-a.timestamp);

    // Gallery display
    const usersMap = {};
    imagesData.forEach(img=>{
        if(!usersMap[img.uploader]) usersMap[img.uploader]=[];
        usersMap[img.uploader].push(img);
    });

    for(const [uploader, imgs] of Object.entries(usersMap)){
        const userSection = document.createElement("div");
        userSection.className="user-section";
        const nameLabel = document.createElement("div");
        nameLabel.className="gallery-info";
        nameLabel.innerHTML=`<span class="name">${uploader}</span>`;
        userSection.appendChild(nameLabel);

        for(const img of imgs){
            const storageRefImg = ref(storage, `photos/${img.fileName}`);
            getDownloadURL(storageRefImg).then(url=>{
                const div = document.createElement("div");
                div.className="gallery-item";
                div.innerHTML=`<img src="${url}" alt="${img.fileName}"><div class="gallery-info"><span class="message">${img.message}</span></div>`;
                
                if(isAdmin){
                    const delBtn = document.createElement("button");
                    delBtn.className="delete-btn";
                    delBtn.innerText="Delete";
                    delBtn.onclick=async ()=>{
                        if(confirm("Verwyder foto?")){
                            await deleteDoc(doc(db, "photos", img.id));
                            await deleteObject(storageRefImg);
                            loadImages(currentFilter, searchBar.value);
                        }
                    };
                    div.appendChild(delBtn);
                }

                div.querySelector("img").addEventListener("click", ()=>{
                    lightboxImg.src=url;
                    lightboxOverlay.style.display="flex";
                });
                userSection.appendChild(div);
            });
        }
        gallery.appendChild(userSection);
    }

    // Carousel featured images (first 5)
    const featuredImgs = imagesData.slice(0,5);
    featuredImgs.forEach((img,i)=>{
        const storageRefImg = ref(storage, `photos/${img.fileName}`);
        getDownloadURL(storageRefImg).then(url=>{
            const imgTag = document.createElement("img");
            imgTag.src=url;
            imgTag.style.display=(i===0)?"block":"none";
            heroCarousel.appendChild(imgTag);
        });
    });
    addCarouselButtons();
}

// ========== Carousel Navigation ==========
function addCarouselButtons(){
    const leftBtn = document.createElement("button");
    leftBtn.innerHTML="&#10094;";
    leftBtn.className="carousel-btn left";
    leftBtn.onclick=()=>carouselNav(-1);
    const rightBtn = document.createElement("button");
    rightBtn.innerHTML="&#10095;";
    rightBtn.className="carousel-btn right";
    rightBtn.onclick=()=>carouselNav(1);
    heroCarousel.appendChild(leftBtn);
    heroCarousel.appendChild(rightBtn);
}

function carouselNav(direction){
    const imgs = heroCarousel.querySelectorAll("img");
    imgs[carouselIndex].style.display="none";
    carouselIndex=(carouselIndex+direction+imgs.length)%imgs.length;
    imgs[carouselIndex].style.display="block";
}

// ========== Search Function ==========
document.getElementById("searchBtn").addEventListener("click", ()=>{
    loadImages(currentFilter, searchBar.value);
});
searchBar.addEventListener("keyup", e=>{
    if(e.key==="Enter") loadImages(currentFilter, searchBar.value);
});

// ========== Messages ==========
const messagesList = document.getElementById("messagesList");
document.getElementById("sendMsgBtn").addEventListener("click", async ()=>{
    const name = document.getElementById("msgName").value || "Anonymous";
    const msg = document.getElementById("msgText").value;
    if(msg.trim()==="") return;
    await addDoc(collection(db,"messages"),{name:name,message:msg,timestamp:Date.now()});
    document.getElementById("msgName").value="";
    document.getElementById("msgText").value="";
    loadMessages();
});

async function loadMessages(){
    messagesList.innerHTML="";
    const snapshot = await getDocs(collection(db,"messages"));
    const msgsArr = [];
    snapshot.forEach(docSnap=>{
        msgsArr.push({...docSnap.data(),id:docSnap.id});
    });
    msgsArr.sort((a,b)=>b.timestamp-a.timestamp);
    msgsArr.forEach(m=>{
        const div = document.createElement("div");
        div.className="message-box";
        div.innerHTML=`<strong>${m.name}</strong><p>${m.message}</p>`;
        if(isAdmin){
            const delBtn = document.createElement("button");
            delBtn.className="msg-delete-btn";
            delBtn.innerText="x";
            delBtn.onclick=async ()=>{
                if(confirm("Verwyder boodskap?")){
                    await deleteDoc(doc(db,"messages",m.id));
                    loadMessages();
                }
            };
            div.appendChild(delBtn);
        }
        messagesList.appendChild(div);
    });
}

// Initial Load
loadImages();
loadMessages();

</script>
</body>
</html>
